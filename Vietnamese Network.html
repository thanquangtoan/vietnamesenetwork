  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

08, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n\n\n<style>\n  :root{\n    --bg:#F5F3EF;\n    --bg2:#EDEAE4;\n    --surface:#FFFFFF;\n    --text:#0D0D0D;\n    --muted:rgba(13,13,13,0.5);\n    --dim:rgba(13,13,13,0.25);\n    --hair:rgba(13,13,13,0.08);\n    --red:#D4311B;\n    --red-dim:rgba(212,49,27,0.08);\n    --red-mid:rgba(212,49,27,0.25);\n    --gold:#E8A020;\n    --gold-dim:rgba(232,160,32,0.1);\n    --grad:linear-gradient(135deg,#D4311B 0%,#E8A020 100%);\n    --shadow-sm:0 1px 2px rgba(13,13,13,0.04), 0 1px 3px rgba(13,13,13,0.03);\n    --shadow-md:0 4px 16px rgba(13,13,13,0.05), 0 1px 3px rgba(13,13,13,0.04);\n    --shadow-lg:0 20px 50px rgba(13,13,13,0.1);\n    --ease:cubic-bezier(.2,.7,.2,1);\n  }\n\n  *{box-sizing:border-box;margin:0;padding:0}\n  html,body{background:var(--bg);color:var(--text);font-family:'Onest',system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth}\n  body{overflow-x:hidden}\n  a{color:inherit;text-decoration:none}\n  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}\n  img{max-width:100%;display:block}\n\n  .container{max-width:1280px;margin:0 auto;padding:0 32px}\n  @media (max-width:768px){.container{padding:0 20px}}\n\n  .grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}\n  .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border:1px solid var(--hair);border-radius:999px;background:var(--surface);font-size:13px;font-weight:500;color:var(--text)}\n  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--red);box-shadow:0 0 0 4px var(--red-dim)}\n  .section-label{display:flex;align-items:center;gap:12px;font-size:13px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:24px}\n  .section-label::before{content:\"\";width:28px;height:1px;background:var(--text);opacity:.5}\n\n  /* ---------- Nav ---------- */\n  nav.top{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 0;transition:background .3s var(--ease),backdrop-filter .3s var(--ease),border-color .3s var(--ease);border-bottom:1px solid transparent}\n  nav.top.scrolled{background:rgba(245,243,239,0.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom-color:var(--hair)}\n  nav.top .row{display:flex;align-items:center;justify-content:space-between;gap:24px}\n  .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;letter-spacing:-0.02em}\n  .logo .mark{width:10px;height:10px;border-radius:50%;background:var(--red);position:relative}\n  .logo .mark::after{content:\"\";position:absolute;inset:-6px;border-radius:50%;background:var(--red-dim);animation:pulse 2.2s ease-in-out infinite}\n  @keyframes pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.3);opacity:.15}}\n\n  .nav-links{display:flex;gap:36px;font-size:14px;font-weight:500}\n  .nav-links a{color:var(--muted);transition:color .2s}\n  .nav-links a:hover{color:var(--text)}\n  .cta-pill{padding:12px 22px;border-radius:999px;background:var(--grad);color:#fff;font-weight:600;font-size:14px;transition:transform .2s var(--ease),box-shadow .3s var(--ease);display:inline-flex;align-items:center;gap:8px}\n  .cta-pill:hover{transform:translateY(-1px);box-shadow:0 10px 30px rgba(212,49,27,0.35)}\n  .ghost-pill{padding:12px 22px;border-radius:999px;background:transparent;color:var(--text);font-weight:600;font-size:14px;border:1px solid var(--text);transition:background .2s,color .2s;display:inline-flex;align-items:center;gap:8px}\n  .ghost-pill:hover{background:var(--text);color:var(--bg)}\n\n  .hamburger{display:none;width:44px;height:44px;border-radius:50%;border:1px solid var(--hair);background:var(--surface);align-items:center;justify-content:center}\n  .hamburger span{display:block;width:18px;height:1.5px;background:var(--text);position:relative}\n  .hamburger span::before,.hamburger span::after{content:\"\";position:absolute;left:0;width:18px;height:1.5px;background:var(--text);transition:transform .2s}\n  .hamburger span::before{top:-5px}\n  .hamburger span::after{top:5px}\n\n  @media (max-width:1040px){\n    .nav-links{display:none}\n    .hamburger{display:flex}\n    nav.top .cta-pill{display:none}\n  }\n\n  /* Mobile menu */\n  .mobile-menu{position:fixed;inset:0;background:var(--bg);z-index:99;padding:100px 32px 40px;transform:translateY(-100%);transition:transform .4s var(--ease);pointer-events:none}\n  .mobile-menu.open{transform:translateY(0);pointer-events:auto}\n  .mobile-menu a{display:block;font-size:32px;font-weight:700;padding:16px 0;border-bottom:1px solid var(--hair);letter-spacing:-0.02em}\n  .mobile-menu .cta-pill{margin-top:24px;display:inline-flex}\n\n  /* ---------- Hero ---------- */\n  .hero{position:relative;min-height:100vh;padding:140px 0 80px;display:flex;flex-direction:column;justify-content:center;overflow:hidden}\n  .hero-bg{position:absolute;inset:0;pointer-events:none;\n    background-image:radial-gradient(circle at 1px 1px, rgba(13,13,13,0.08) 1px, transparent 0);\n    background-size:28px 28px;\n    mask-image:radial-gradient(ellipse at center, #000 0%, transparent 75%);\n    -webkit-mask-image:radial-gradient(ellipse at center, #000 0%, transparent 75%);\n  }\n  .hero-blob{position:absolute;width:900px;height:900px;border-radius:50%;filter:blur(120px);pointer-events:none;opacity:.5}\n  .hero-blob.a{background:radial-gradient(circle, rgba(212,49,27,.18) 0%, transparent 65%);top:-200px;right:-200px}\n  .hero-blob.b{background:radial-gradient(circle, rgba(232,160,32,.18) 0%, transparent 65%);bottom:-300px;left:-200px}\n\n  /* Mouse-follow glow */\n  .hero-cursor{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden}\n  .hero-cursor .glow{position:absolute;width:520px;height:520px;border-radius:50%;filter:blur(80px);transform:translate(-50%,-50%);will-change:left,top,opacity;transition:opacity .6s ease}\n  .hero-cursor .glow.g1{background:radial-gradient(circle, rgba(212,49,27,0.32) 0%, rgba(212,49,27,0.12) 35%, transparent 70%)}\n  .hero-cursor .glow.g2{background:radial-gradient(circle, rgba(232,120,50,0.22) 0%, rgba(232,120,50,0.08) 40%, transparent 70%);width:380px;height:380px}\n  .hero-cursor .glow.g3{background:radial-gradient(circle, rgba(212,49,27,0.18) 0%, transparent 65%);width:260px;height:260px}\n  .hero-cursor.idle .glow{opacity:.6}\n  .hero-inner{z-index:3 !important}\n\n  .hero-inner{position:relative;z-index:2}\n  .hero .eyebrow{opacity:0;transform:translateY(20px);animation:rise .8s var(--ease) .1s forwards}\n  h1.hero-title{font-size:clamp(56px,10vw,168px);font-weight:900;line-height:.92;letter-spacing:-0.045em;margin:24px 0 32px;max-width:1100px}\n  h1.hero-title span.line{display:block;opacity:0;transform:translateY(30px);animation:rise .9s var(--ease) forwards}\n  h1.hero-title span.line:nth-child(1){animation-delay:.2s}\n  h1.hero-title span.line:nth-child(2){animation-delay:.3s}\n  h1.hero-title span.line:nth-child(3){animation-delay:.4s}\n  @keyframes rise{to{opacity:1;transform:translateY(0)}}\n\n  .hero-sub{font-size:20px;max-width:580px;color:var(--muted);margin-bottom:40px;opacity:0;transform:translateY(20px);animation:rise .8s var(--ease) .5s forwards;line-height:1.4}\n  .hero-sub b{color:var(--text);font-weight:500}\n  .hero-ctas{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:80px;opacity:0;transform:translateY(20px);animation:rise .8s var(--ease) .6s forwards}\n\n  .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;opacity:0;transform:translateY(20px);animation:rise .8s var(--ease) .75s forwards}\n  .stat-card{background:var(--surface);border-radius:20px;padding:28px;box-shadow:var(--shadow-md);border:1px solid var(--hair);position:relative;overflow:hidden;transition:transform .3s var(--ease)}\n  .stat-card:hover{transform:translateY(-4px)}\n  .stat-card::before{content:\"\";position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad);opacity:0;transition:opacity .3s}\n  .stat-card:hover::before{opacity:1}\n  .stat-card .num{font-size:48px;font-weight:900;letter-spacing:-0.04em;line-height:1}\n  .stat-card .lbl{font-size:14px;color:var(--muted);margin-top:8px;font-weight:500}\n\n  @media (max-width:1040px){\n    h1.hero-title{font-size:clamp(48px,12vw,104px)}\n    .stat-row{grid-template-columns:1fr}\n    .hero{min-height:auto;padding:120px 0 60px}\n  }\n  @media (max-width:768px){\n    .stat-row{display:none}\n    .hero{padding:110px 0 40px}\n  }\n\n  /* ---------- Strip ---------- */\n  .strip{background:#0D0D0D;color:#fff;padding:48px 0;border-top:1px solid #1a1a1a;border-bottom:1px solid #1a1a1a;position:relative;overflow:hidden}\n  .strip::before{content:\"\";position:absolute;inset:0;background:radial-gradient(ellipse at center, rgba(212,49,27,0.18) 0%, transparent 60%);pointer-events:none}\n  .strip-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;position:relative;z-index:2}\n  .strip-cell{padding:16px 32px;border-left:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;gap:6px}\n  .strip-cell:first-child{border-left:0;padding-left:0}\n  .strip-cell .k{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.45);display:flex;align-items:center;gap:8px}\n  .strip-cell .k::before{content:\"\";width:6px;height:6px;border-radius:50%;background:var(--red);box-shadow:0 0 0 4px rgba(212,49,27,0.2)}\n  .strip-cell .v{font-size:22px;font-weight:600;letter-spacing:-0.02em;line-height:1.2}\n  .strip-cell .v b{font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}\n  @media (max-width:768px){\n    .strip{padding:32px 0}\n    .strip-grid{grid-template-columns:1fr;gap:24px}\n    .strip-cell{padding:0;border-left:0;border-top:1px solid rgba(255,255,255,0.08);padding-top:24px}\n    .strip-cell:first-child{border-top:0;padding-top:0}\n  }\n\n  /* ---------- Sections generic ---------- */\n  section{padding:120px 0;position:relative}\n  @media (max-width:768px){section{padding:80px 0}}\n  h2.section-title{font-size:clamp(40px,6vw,80px);font-weight:700;letter-spacing:-0.035em;line-height:1;max-width:900px}\n  h2.section-title .grad-text{font-weight:900}\n  .section-sub{font-size:18px;color:var(--muted);margin-top:20px;max-width:560px;line-height:1.5}\n\n  /* ---------- About ---------- */\n  .about-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:80px;align-items:start}\n  .about-grid p{font-size:17px;line-height:1.55;color:var(--muted);margin-top:16px;max-width:520px}\n  .about-grid p b{color:var(--text);font-weight:500}\n  .quote-block{margin-top:32px;padding:20px 24px;border-left:3px solid var(--red);background:var(--surface);border-radius:4px 12px 12px 4px;box-shadow:var(--shadow-sm)}\n  .quote-block q{font-size:16px;font-style:italic;line-height:1.5;display:block;color:var(--text)}\n  .quote-block q::before,.quote-block q::after{content:\"\"}\n  .quote-block cite{display:block;margin-top:12px;font-size:13px;color:var(--muted);font-style:normal;font-weight:500}\n\n  .feature-pills{display:flex;flex-direction:column;gap:12px}\n  .pill-card{background:var(--surface);border:1px solid var(--hair);border-radius:16px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;transition:transform .25s var(--ease),border-color .25s,box-shadow .25s;cursor:default;position:relative;overflow:hidden}\n  .pill-card:hover{transform:translateX(6px);border-color:var(--red-mid);box-shadow:var(--shadow-md)}\n  .pill-card .idx{font-family:'Onest',monospace;font-size:12px;color:var(--dim);font-weight:500;font-variant-numeric:tabular-nums}\n  .pill-card .nm{font-size:18px;font-weight:600;letter-spacing:-0.01em;flex:1;margin-left:16px}\n  .pill-card .arrow{font-size:16px;color:var(--muted);transition:transform .25s, color .25s}\n  .pill-card:ho r a valid email.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label for=\"f-type\">What brings you here?<\u002Flabel>\n          <select id=\"f-type\" name=\"type\">\n            <option value=\"\">Select one<\u002Foption>\n            <option>Brand campaign<\u002Foption>\n            <option>Creator application<\u002Foption>\n            <option>Partnership / press<\u002Foption>\n            <option>Other<\u002Foption>\n          <\u002Fselect>\n          <span class=\"msg\">Please pick an option.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label for=\"f-message\">Message<\u002Flabel>\n          <textarea id=\"f-message\" name=\"message\" placeholder=\"Tell us a bit about what you need.\"><\u002Ftextarea>\n          <span class=\"msg\">Say a few words.<\u002Fspan>\n        <\u002Fdiv>\n        <button type=\"submit\" class=\"submit cta-pill\">Send message <span>→<\u002Fspan><\u002Fbutton>\n        <div class=\"success\" id=\"successMsg\">✓ Thanks — we'll be in touch within 24 hours.<\u002Fdiv>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ---------- FOOTER ---------- -->\n<footer>\n  <div class=\"container\">\n    <div class=\"footer-brand\">\n      <div class=\"footer-brand-track\">\n        <span>VIETNAMESE&nbsp;NETWORK<\u002Fspan>\n        <span>VIETNAMESE&nbsp;NETWORK<\u002Fspan>\n        <span>VIETNAMESE&nbsp;NETWORK<\u002Fspan>\n        <span>VIETNAMESE&nbsp;NETWORK<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"footer-divider\"><\u002Fdiv>\n    <div class=\"footer-grid\">\n      <div class=\"footer-col footer-about\">\n        <div class=\"logo\" style=\"margin-bottom:12px\"><span class=\"mark\"><\u002Fspan><span>Vietnamese Network<\u002Fspan><\u002Fdiv>\n        <p>Creator &amp; brand network on Facebook, TikTok and YouTube. Reaching audiences 16–30 across Vietnam.<\u002Fp>\n        <div class=\"legal\">\n          Ho Chi Minh City, Vietnam<br>\n          contact@vietnamesenetwork.vn<br>\n          MST: <span style=\"color:var(--muted)\">_ _ _ _ _ _ _ _ _ _<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footer-col\">\n        <h5>Navigation<\u002Fh5>\n        <ul>\n          <li><a href=\"#about\">About<\u002Fa><\u002Fli>\n          <li><a href=\"#services\">Services<\u002Fa><\u002Fli>\n          <li><a href=\"#partners\">Partners<\u002Fa><\u002Fli>\n          <li><a href=\"#contact\">Contact<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"footer-col\">\n        <h5>Services<\u002Fh5>\n        <ul>\n          <li><a href=\"#services\">Facebook Network<\u002Fa><\u002Fli>\n          <li><a href=\"#services\">TikTok Network<\u002Fa><\u002Fli>\n          <li><a href=\"#services\">Brand Deals<\u002Fa><\u002Fli>\n          <li><a href=\"#services\">Content Strategy<\u002Fa><\u002Fli>\n          <li><a href=\"#services\">Booking KOL/KOC<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"footer-col\">\n        <h5>Legal<\u002Fh5>\n        <ul>\n          <li><a href=\"#\">Privacy policy<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Terms of service<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Cookie preferences<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Business info<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"footer-bar\">\n      <div class=\"cr\">© 2026 Vietnamese Network. All rights reserved.<\u002Fdiv>\n      <span class=\"flag-pill\"><span class=\"sq\"><\u002Fspan> Media · Vietnam 🇻🇳<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  // Nav scroll state\n  const nav = document.getElementById('nav');\n  const onScroll = () => nav.classList.toggle('scrolled', window.scrollY > 20);\n  window.addEventListener('scroll', onScroll, {passive:true}); onScroll();\n\n  // Mobile menu\n  const hb = document.getElementById('hamburger');\n  const mm = document.getElementById('mobileMenu');\n  hb.addEventListener('click', () => mm.classList.toggle('open'));\n  mm.querySelectorAll('a').forEach(a => a.addEventListener('click', () => mm.classList.remove('open')));\n\n  // Scroll reveal\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => { if (e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });\n  }, {threshold:0.12});\n  document.querySelectorAll('.reveal').forEach(el => io.observe(el));\n\n  // Number counters\n  const animateCount = (el) => {\n    const target = parseFloat(el.dataset.count);\n    const suffix = el.dataset.suffix || '';\n    const dur = 1400;\n    const start = performance.now();\n    const tick = (now) => {\n      const t = Math.min(1, (now - start) / dur);\n      const eased = 1 - Math.pow(1 - t, 3);\n      const val = target * eased;\n      const display = target >= 100 ? Math.round(val) : (val).toFixed(0);\n      el.textContent = display + suffix;\n      if (t < 1) requestAnimationFrame(tick);\n    };\n    requestAnimationFrame(tick);\n  };\n  const countIO = new IntersectionObserver((entries) => {\n    entries.forEach(e => { if (e.isIntersecting){ animateCount(e.target); countIO.unobserve(e.target);} });\n  }, {threshold:0.4});\n  document.querySelectorAll('[data-count]').forEach(el => countIO.observe(el));\n\n  // Hero cursor-follow glow\n  (function(){\n    const hero = document.querySelector('.hero');\n    const wrap = document.getElementById('heroCursor');\n    const glows = [\n      {el: document.getElementById('glow1'), x: 0, y: 0, tx: 0, ty: 0, ease: 0.12},\n      {el: document.getElementById('glow2'), x: 0, y: 0, tx: 0, ty: 0, ease: 0.07},\n      {el: document.getElementById('glow3'), x: 0, y: 0, tx: 0, ty: 0, ease: 0.04},\n    ];\n    let mx = window.innerWidth / 2, my = 320;\n    glows.forEach(g => { g.x = mx; g.y = my; g.tx = mx; g.ty = my; g.el.style.left = mx+'px'; g.el.style.top = my+'px'; });\n    let idleTimer;\n    const onMove = (e) => {\n      const r = hero.getBoundingClientRect();\n      mx = e.clientX - r.left;\n      my = e.clientY - r.top;\n      wrap.classList.remove('idle');\n      clearTimeout(idleTimer);\n      idleTimer = setTimeout(() => wrap.classList.add('idle'), 1200);\n    };\n    hero.addEventListener('mousemove', onMove);\n    hero.addEventListener('mouseleave', () => wrap.classList.add('idle'));\n    let t = 0;\n    function tick(){\n      t += 0.012;\n      glows.forEach((g, i) => {\n        // Add subtle drift so they feel alive when idle\n        const driftX = Math.sin(t + i*1.7) * (i===0 ? 8 : 22);\n        const driftY = Math.cos(t + i*2.1) * (i===0 ? 8 : 18);\n        g.tx = mx + driftX;\n        g.ty = my + driftY;\n        g.x += (g.tx - g.x) * g.ease;\n        g.y += (g.ty - g.y) * g.ease;\n        g.el.style.left = g.x + 'px';\n        g.el.style.top = g.y + 'px';\n      });\n      requestAnimationFrame(tick);\n    }\n    tick();\n    setTimeout(() => wrap.classList.add('idle'), 1500);\n  })();\n  const form = document.getElementById('contactForm');\n  const success = document.getElementById('successMsg');\n  form.addEventListener('submit', (e) => {\n    e.preventDefault();\n    let ok = true;\n    const check = (id, fn) => {\n      const f = document.getElementById(id).closest('.field');\n      const val = document.getElementById(id).value.trim();\n      const valid = fn(val);\n      f.classList.toggle('err', !valid);\n      if (!valid) ok = false;\n    };\n    check('f-name', v => v.length > 1);\n    check('f-email', v => /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(v));\n    check('f-type', v => v.length > 0);\n    check('f-message', v => v.length > 3);\n    if (ok){\n      success.classList.add('show');\n      form.reset();\n      setTimeout(() => success.classList.remove('show'), 6000);\n    }\n  });\n  // Clear errors on input\n  form.querySelectorAll('input, select, textarea').forEach(el => {\n    el.addEventListener('input', () => el.closest('.field').classList.remove('err'));\n  });\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
